<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>字幕時間軸校對工具 PRO MAX Final</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>字幕時間軸校對工具 PRO MAX Final</h1>
      <div>
        <input type="file" id="audioInput">
        <input type="file" id="srtInput">
        <button id="exportBtn">匯出 SRT</button>
      </div>
    </header>

    <audio id="audio" controls></audio>

    <div id="timelineScroller" class="timeline-scroller">
      <div id="timelineCanvasWrap" class="timeline-canvas-wrap">
        <canvas id="waveCanvas"></canvas>
        <div id="playhead"></div>
        <div id="subtitleTrack"></div>
      </div>
    </div>

    <div id="subtitleList"></div>
  </div>

<script src="app.js"></script>
</body>
</html>
